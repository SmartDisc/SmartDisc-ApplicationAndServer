---
# Development stack: Symfony API + PostgreSQL (from SmartDisc-Server) only.
#
# Usage: docker compose up --build
#
# SmartDisc-Application (the Vue frontend) is never run in Docker — it ships
# as a native Capacitor app and is run locally with `npm run dev`, see the
# README. Production is the same Symfony-only stack, see compose.prod.yaml.
include:
  - path: ./SmartDisc-Server/compose.yaml
    env_file: ./SmartDisc-Server/.env
  - path: ./SmartDisc-Server/compose.override.yaml
    env_file: ./SmartDisc-Server/.env
