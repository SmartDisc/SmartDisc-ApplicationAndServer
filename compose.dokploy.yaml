---
# Dokploy deployment entry point.
#
# This is the same stack as compose.prod.yaml, but deliberately does NOT
# set `env_file: ./SmartDisc-Server/.env` on the include below. That file
# is gitignored, so it never exists after Dokploy's fresh `git clone` on
# every deploy — and env_file on an include is required (no way to mark it
# optional), so a plain `docker compose up` would fail immediately.
#
# Instead, every variable flows from Dokploy's own Environment Variables
# UI, which Dokploy writes to ./.env next to this file — Docker Compose
# loads that automatically, and it already takes precedence over any
# include's env_file (verified), so nothing is lost by dropping it here.
#
# Dokploy setup:
#   - Compose Path: compose.dokploy.yaml (repo root) — no Custom Command
#     needed, the default `docker compose ... up -d --build` just works.
#   - Environment Variables (UI): SERVER_NAME, APP_SECRET, POSTGRES_PASSWORD,
#     CADDY_MERCURE_JWT_SECRET, JWT_PASSPHRASE (required); POSTGRES_DB,
#     POSTGRES_USER, HTTP_PORT (optional, have defaults)
include:
  - path: ./SmartDisc-Server/compose.yaml
  - path: ./SmartDisc-Server/compose.prod.yaml
